name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./kerdomax-site

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./kerdomax-site

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./kerdomax-site

      - name: Health Check
        run: |
          URLS=("https://kerdomax.com" "https://www.kerdomax.com")
          for url in "${URLS[@]}"; do
            echo "Checking $url"
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$code" -eq 200 ]; then
              echo "OK: $url (HTTP $code)"
            else
              echo "ERROR: $url returned HTTP $code"
              exit 1
            fi
          done

          main=$(curl -s https://kerdomax.com | head -n 20)
          if echo "$main" | grep -iq "KERDOMAX"; then
            echo "Content check passed for kerdomax homepage"
          else
            echo "Content check FAILED: branding text not found"
            exit 1
          fi
